# Frontend
location / {
    set $frontend_server "${FRONTEND_HOST}";
    proxy_pass http://$frontend_server;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Block hidden files
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

}