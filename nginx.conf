    proxy_set_header Connection "";
}

location /api/comments {
    limit_req zone=api_limit burst=20 nodelay;
    set $ticket_server "${TICKET_SERVICE_HOST}";
    proxy_pass http://$ticket_server;
    proxy_http_version 1.1;
