limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
listen 80;
server_name _;
client_max_body_size 10M;

# Security headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "no-referrer-when-downgrade" always;

# Health check
location /health {
    access_log off;
    return 200 "OK";
    add_header Content-Type text/plain;
}

# Identity routes
location ~ ^/auth(.*)$ {
    limit_req zone=api_limit burst=20 nodelay;
    rewrite ^/auth(/.*)$ $1 break;
    rewrite ^/auth$ / break;
    proxy_pass http://${IDENTITY_SERVER_HOST};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Service-Secret "${NGINX_SECRET_KEY}";
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_request_buffering off;
}

location ~ ^/api/auth(.*)$ {
    limit_req zone=api_limit burst=20 nodelay;
    rewrite ^/api/auth(/.*)$ $1 break;
    rewrite ^/api/auth$ / break;
    proxy_pass http://${IDENTITY_SERVER_HOST};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Service-Secret "${NGINX_SECRET_KEY}";
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_request_buffering off;
}

# Email service
location /email {
    limit_req zone=api_limit burst=20 nodelay;
    proxy_pass http://${EMAIL_SERVICE_HOST};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
}

location /api/email {
    limit_req zone=api_limit burst=20 nodelay;
    proxy_pass http://${EMAIL_SERVICE_HOST};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
}

# Organization health
location = /api/organizations/health {
    proxy_pass http://${ORGANIZATION_SERVICE_HOST}/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}

# Organization routes
location /api/organizations {
    limit_req zone=api_limit burst=20 nodelay;
    proxy_pass http://${ORGANIZATION_SERVICE_HOST};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
}

location /api/members {
    limit_req zone=api_limit burst=20 nodelay;
    proxy_pass http://${ORGANIZATION_SERVICE_HOST};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
}

# Ticket service
location /api/tickets {
    limit_req zone=api_limit burst=20 nodelay;
    proxy_pass http://${TICKET_SERVICE_HOST};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Service-Secret "${NGINX_SECRET_KEY}";
    proxy_set_header Connection "";
}

location /api/comments {
    limit_req zone=api_limit burst=20 nodelay;
    proxy_pass http://${TICKET_SERVICE_HOST};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Service-Secret "${NGINX_SECRET_KEY}";
}

location /api/assignments {
    limit_req zone=api_limit burst=20 nodelay;
    proxy_pass http://${TICKET_SERVICE_HOST};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Service-Secret "${NGINX_SECRET_KEY}";
}

# Frontend
location / {
    proxy_pass http://${FRONTEND_HOST};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Block hidden files
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

}