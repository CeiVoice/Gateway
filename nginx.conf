limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
listen 80;
server_name _;
client_max_body_size 10M;

# Use public DNS resolvers (Railway does not have Docker's 127.0.0.11); ipv6=off avoids Railway IPv6 timeout issues
resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;

# Upstream timeout settings
proxy_connect_timeout 5s;
proxy_send_timeout    30s;
proxy_read_timeout    30s;
proxy_next_upstream   error timeout http_502 http_503 http_504;
proxy_next_upstream_tries 2;

# Security headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "no-referrer-when-downgrade" always;

# CORS preflight – handle locally so a down upstream never blocks OPTIONS
location = /auth/signin {
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin  $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age 86400 always;
        return 204;
    }
    set $identity_server "${IDENTITY_SERVER_HOST}";
    limit_req zone=api_limit burst=20 nodelay;
    proxy_pass http://$identity_server/signin;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Service-Secret "${NGINX_SECRET_KEY}";
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_request_buffering off;
}

# Health check
location /health {
    access_log off;
    return 200 "OK";
    add_header Content-Type text/plain;
}

# Identity routes
location ~ ^/auth(.*)$ {
    limit_req zone=api_limit burst=20 nodelay;
    rewrite ^/auth(/.*)$ $1 break;
    rewrite ^/auth$ / break;
    set $identity_server "${IDENTITY_SERVER_HOST}";
    proxy_pass http://$identity_server;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Service-Secret "${NGINX_SECRET_KEY}";
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_request_buffering off;
}

location ~ ^/api/auth(.*)$ {
    limit_req zone=api_limit burst=20 nodelay;
    rewrite ^/api/auth(/.*)$ $1 break;
    rewrite ^/api/auth$ / break;
    set $identity_server "${IDENTITY_SERVER_HOST}";
    proxy_pass http://$identity_server;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Service-Secret "${NGINX_SECRET_KEY}";
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_request_buffering off;
}

# Email service
location /email {
    limit_req zone=api_limit burst=20 nodelay;
    set $email_server "${EMAIL_SERVICE_HOST}";
    proxy_pass http://$email_server;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
}

location /api/email {
    limit_req zone=api_limit burst=20 nodelay;
    set $email_server "${EMAIL_SERVICE_HOST}";
    proxy_pass http://$email_server;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
}

# Organization health
location = /api/organizations/health {
    set $org_server "${ORGANIZATION_SERVICE_HOST}";
    proxy_pass http://$org_server/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}

# Organization routes
location /api/organizations {
    limit_req zone=api_limit burst=20 nodelay;
    set $org_server "${ORGANIZATION_SERVICE_HOST}";
    proxy_pass http://$org_server;
    proxy_http_version 1.1;
